<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>PC Builder Simulator</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

.box{
    background:#222;
    width:700px;
    margin:auto;
    padding:20px;
    border-radius:15px;
}

select,button{
    width:250px;
    padding:10px;
    margin:5px;
}

#result{
    margin-top:20px;
    font-size:20px;
}
</style>

</head>
<body>

<h1>🖥️ PC Builder Simulator</h1>

<div class="box">

<h2>CPU</h2>
<select id="cpu">
<option value="">Vyber CPU</option>
<option value="LGA1155">Intel i7-3770K</option>
<option value="LGA1700">Intel i5-14600K</option>
<option value="AM4">Ryzen 7 5800X</option>
<option value="AM5">Ryzen 7 9800X3D</option>
</select>

<h2>Motherboard</h2>
<select id="mb">
<option value="">Vyber desku</option>
<option value="LGA1155">H61</option>
<option value="LGA1700">Z790</option>
<option value="AM4">B550</option>
<option value="AM5">X870</option>
</select>

<h2>GPU</h2>
<select id="gpu">
<option>GTX 1060</option>
<option>RTX 3060</option>
<option>RTX 5080</option>
<option>RTX 5090</option>
</select>

<h2>RAM</h2>
<select id="ram">
<option>16GB DDR4</option>
<option>32GB DDR4</option>
<option>64GB DDR5</option>
<option>96GB DDR5</option>
</select>

<h2>SSD</h2>
<select id="ssd">
<option>512GB NVMe</option>
<option>1TB NVMe</option>
<option>2TB NVMe</option>
<option>4TB NVMe</option>
</select>

<h2>PSU</h2>
<select id="psu">
<option value="500">500W</option>
<option value="750">750W</option>
<option value="1000">1000W</option>
<option value="1200">1200W</option>
</select>

<br><br>

<button onclick="buildPC()">Postavit PC</button>

<div id="result"></div>

</div>

<script>

let money = 100000;

function buildPC(){

let cpu = document.getElementById("cpu").value;
let mb = document.getElementById("mb").value;
let gpu = document.getElementById("gpu").value;
let psu = parseInt(document.getElementById("psu").value);

if(cpu === "" || mb === ""){
    document.getElementById("result").innerHTML =
    "❌ Vyber CPU a desku";
    return;
}

if(cpu !== mb){
    document.getElementById("result").innerHTML =
    "❌ CPU není kompatibilní s deskou";
    return;
}

let fps = Math.floor(Math.random()*250)+60;
let temp = Math.floor(Math.random()*40)+40;

document.getElementById("result").innerHTML =
`
✅ PC úspěšně sestaveno<br><br>

🎮 FPS: ${fps}<br>
🌡️ CPU teplota: ${temp}°C<br>
💰 Peníze: ${money} Kč<br>
🖥️ GPU: ${gpu}
`;

}

</script>

</body>
</html>
